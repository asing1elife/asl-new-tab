<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新标签页</title>
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="sidebar__brand">
        <span id="brandIcon" class="sidebar__brand-icon"></span>
        <h1 class="sidebar__brand-text">书签门户</h1>
      </header>
      <nav id="folderList" class="folder-list" aria-label="书签目录"></nav>
    </aside>

    <main class="content">
      <header class="content__header">
        <h2 id="contentTitle" class="content__title"></h2>
        <div class="search">
          <span id="searchIcon" class="search__icon"></span>
          <input
            id="searchInput"
            class="search__input"
            type="search"
            placeholder="搜索书签…"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </header>
      <section id="contentBody" class="content__body" aria-live="polite"></section>
    </main>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
