<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <link rel="icon" type="image/png" sizes="48x48" href="icons/icon48.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png" />
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="sidebar__brand">
        <h1 class="sidebar__brand-text">Bookmarks</h1>
        <div class="sidebar__brand-actions">
          <button id="refreshWallpaperBtn" class="sidebar__icon-btn" type="button" title="Refresh wallpaper" aria-label="Refresh wallpaper"></button>
          <button id="settingsBtn" class="sidebar__icon-btn" type="button" title="Settings" aria-label="Settings"></button>
        </div>
      </header>
      <nav id="folderList" class="folder-list" aria-label="Bookmark folders"></nav>
      <button id="addFolderBtn" type="button" class="sidebar__add">
        <span id="addFolderIcon" class="sidebar__add-icon"></span>
        <span>New Folder</span>
      </button>
    </aside>

    <main class="content">
      <header class="content__header">
        <div class="content__heading">
          <h2 id="contentTitle" class="content__title"></h2>
          <span id="contentActions" class="content__actions"></span>
        </div>
        <div class="search">
          <span id="searchIcon" class="search__icon"></span>
          <input
            id="searchInput"
            class="search__input"
            type="search"
            placeholder="Search bookmarks…"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </header>
      <section id="contentBody" class="content__body" aria-live="polite"></section>
    </main>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
